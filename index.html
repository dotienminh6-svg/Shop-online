<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Online - Thiết Bị Công Nghiệp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Shop Thiết Bị Công Nghiệp</h1>
    </header>
        
     <div class="product-grid">
        
     <div class="filter-buttons">
    <button onclick="filterProducts('all')">Tất cả</button>
    <button onclick="filterProducts('printer')">Máy in</button>
    <button onclick="filterProducts('scanner')">Máy quét</button>
</div>

<div class="product-grid">
    <div class="card" data-category="printer">
        <h3>Máy in mã vạch A</h3>
        <p>Giá: 5.000.000đ</p>
    </div>
    <div class="card" data-category="scanner">
        <h3>Máy quét mã vạch B</h3>
        <p>Giá: 2.000.000đ</p>
    </div>
</div>

    </div>

</body>
</html>
