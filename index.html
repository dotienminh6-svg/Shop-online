<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Online - Thiết Bị Công Nghiệp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Shop Thiết Bị Công Nghiệp</h1>
    </header>

    <div class="product-grid">
        
        <div class="card">
            <h3>Máy in mã vạch</h3>
            <p class="price">5.000.000đ</p>
            <button>Xem chi tiết</button>
        </div>

        <div class="card">
            <h3>Máy quét mã vạch</h3>
            <p class="price">2.000.000đ</p>
            <button>Xem chi tiết</button>
        </div>

    </div>

</body>
</html>
